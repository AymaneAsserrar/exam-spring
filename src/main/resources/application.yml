spring:
  application:
    name: bike-shop-api

  datasource:
    url: jdbc:h2:mem:bikeshopdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.bikeshop: DEBUG
    org.hibernate.SQL: DEBUG

api:
  security:
    token: bike-shop-secret-token-2026
